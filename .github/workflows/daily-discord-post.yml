name: Daily Discord Task Post

on:
  schedule:
    # Runs at 00:13 UTC every day. Deliberately NOT :00 or :05 — those are
    # the most popular minutes for scheduled GitHub Actions worldwide, so
    # jobs queued there get delayed the most under load. An odd minute like
    # :13 sees far less contention and tends to fire closer to on-time.
    # Change the two numbers below to adjust the time: "MINUTE HOUR * * *"
    # (24-hour, UTC).
    - cron: '13 0 * * *'
  workflow_dispatch:
    inputs:
      test_date:
        description: 'Override date for testing (YYYY-MM-DD). Leave blank to use today.'
        required: false
        default: ''

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Post today's tasks to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TEST_DATE: ${{ github.event.inputs.test_date }}
        run: node scripts/post-daily-discord.js
