name: Daily Discord Task Post

on:
  # Automatic daily schedule is turned off — this now only runs when you
  # manually trigger it from the Actions tab. To turn scheduling back on
  # later, add back a "schedule:" block with a cron line, e.g.:
  #   schedule:
  #     - cron: '13 0 * * *'
  workflow_dispatch:
    inputs:
      test_date:
        description: 'Override date for testing (YYYY-MM-DD). Leave blank to use today.'
        required: false
        default: ''

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Post today's tasks to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TEST_DATE: ${{ github.event.inputs.test_date }}
        run: node scripts/post-daily-discord.js
